name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Packages
        run: npm ci

      - name: Build Angular App
        run: npm run build -- --configuration production --base-href "/project-dog/"

      - name: Upload Build Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/project-dog/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Website
        uses: actions/deploy-pages@v4