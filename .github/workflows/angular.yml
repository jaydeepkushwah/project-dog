name: Angular Enterprise Pipeline

on:
  push:
    branches:
      - '**'

  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint


  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test -- --watch=false --browsers=ChromeHeadless


  build:
    name: Build Angular App
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build -- --configuration production --base-href "/project-dog/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/project-dog/browser


  deploy:
    name: Deploy Website
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4