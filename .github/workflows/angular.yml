name: Angular Enterprise CI/CD

on:
  push:
    branches:
      - develop
      - main

  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Packages
        run: npm ci

      - name: Run Lint
        run: npm run lint


  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Packages
        run: npm ci

      - name: Run Tests
        run: npm test -- --watch=false --browsers=ChromeHeadless


  build:
    name: Build Angular App
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Packages
        run: npm ci

      - name: Build Production
        run: npm run build -- --configuration production --base-href "/project-dog/"

      - name: Upload Build Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/project-dog/browser


  deploy:
    name: Deploy Website
    runs-on: ubuntu-latest
    needs: build

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4